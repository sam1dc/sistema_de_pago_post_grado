<div class="card">
  <div class="card-content">
    <h2 class="title is-5 mb-4">
      <span class="icon-text">
        <span class="icon has-text-primary">
          <i class="mdi mdi-plus-circle"></i>
        </span>
        <span>Agregar Nuevo Pago</span>
      </span>
    </h2>

    <div class="field">
      <label class="label">Cédula del Alumno</label>
      <div class="field has-addons">
        <div class="control is-expanded has-icons-left">
          <input class="input" type="text" id="searchCedula" placeholder="Ingrese la cédula para buscar">
          <span class="icon is-left">
            <i class="mdi mdi-card-account-details"></i>
          </span>
        </div>
        <div class="control">
          <button class="button is-primary" id="searchStudentBtn">
            <span class="icon">
              <i class="mdi mdi-magnify"></i>
            </span>
            <span>Buscar</span>
          </button>
        </div>
        <div class="control" id="ocrButtonContainer" style="display: none;">
          <button class="button is-info" id="openOcrModalBtn" title="Escanear comprobante de pago">
            <span class="icon">
              <i class="mdi mdi-camera-image"></i>
            </span>
          </button>
        </div>
      </div>
    </div>

    <div id="addResults"></div>

    <div id="studentForm" class="hidden" style="display: none;">
      <hr class="my-5">
      
      <h3 class="subtitle is-6 mb-4">Información del Estudiante</h3>
      
      <div class="columns">
        <div class="column">
          <div class="field">
            <label class="label">Cédula</label>
            <div class="control">
              <input class="input" type="text" id="addCedula" readonly>
            </div>
          </div>
        </div>
        <div class="column">
          <div class="field">
            <label class="label">Nombre Completo</label>
            <div class="control">
              <input class="input" type="text" id="addNombreCompleto" placeholder="Nombre y Apellido">
            </div>
          </div>
        </div>
      </div>

      <h3 class="subtitle is-6 mb-4 mt-5">Detalles del Pago</h3>

      <div class="notification is-info is-light" id="deudaActualInfo" style="display: none;">
        <strong>Deuda Actual:</strong> $<span id="deudaActualMonto">0.00</span>
      </div>

      <div class="columns">
        <div class="column">
          <div class="field">
            <label class="label">Asignatura</label>
            <div class="control">
              <input class="input" type="text" id="addAsignatura" placeholder="Ej: PREINSCRIPCIÓN, INSCRIPCIÓN, UC">
            </div>
          </div>
        </div>
        <div class="column">
          <div class="field">
            <label class="label">Fecha <span class="has-text-danger">*</span></label>
            <div class="control">
              <input class="input" type="date" id="addFecha" required>
            </div>
          </div>
        </div>
      </div>

      <div class="columns">
        <div class="column">
          <div class="field">
            <label class="label">U.C (Unidades de Crédito)</label>
            <div class="control">
              <input class="input" type="number" id="addUC" placeholder="0" step="1">
            </div>
          </div>
        </div>
        <div class="column">
          <div class="field">
            <label class="label">Costo por U.C</label>
            <div class="control has-icons-left">
              <input class="input" type="number" id="addCostoUC" placeholder="0.00" step="0.01">
              <span class="icon is-left">
                <i class="mdi mdi-currency-usd"></i>
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="columns">
        <div class="column">
          <div class="field">
            <label class="label">Total a Pagar <small class="has-text-grey">(Deuda + Nuevos Cargos)</small></label>
            <div class="control has-icons-left">
              <input class="input" type="number" id="addTotalPagar" placeholder="0.00" step="0.01" readonly>
              <span class="icon is-left">
                <i class="mdi mdi-currency-usd"></i>
              </span>
            </div>
          </div>
        </div>
        <div class="column">
          <div class="field">
            <label class="label">Abono</label>
            <div class="control has-icons-left">
              <input class="input" type="number" id="addAbono" placeholder="0.00" step="0.01">
              <span class="icon is-left">
                <i class="mdi mdi-currency-usd"></i>
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="field">
        <label class="label">Resta <small class="has-text-grey">(Nueva Deuda)</small></label>
        <div class="control has-icons-left">
          <input class="input" type="number" id="addResta" placeholder="0.00" step="0.01" readonly>
          <span class="icon is-left">
            <i class="mdi mdi-currency-usd"></i>
          </span>
        </div>
      </div>

      <div class="field">
        <label class="label">Observación</label>
        <div class="control">
          <textarea class="textarea" id="addObservacion" placeholder="Ej: REF 9069 TASA" rows="2"></textarea>
        </div>
      </div>

      <div class="field">
        <label class="label">Archivo Excel</label>
        <div class="control">
          <div class="select is-fullwidth">
            <select id="fileSelect">
              <option value="">Seleccione un archivo</option>
            </select>
          </div>
        </div>
      </div>

      <div class="field" id="sheetSelectField" style="display: none;">
        <label class="label">Maestría (Hoja del Excel)</label>
        <div class="control">
          <div class="select is-fullwidth">
            <select id="sheetSelect">
              <option value="">Seleccione una maestría</option>
            </select>
          </div>
        </div>
      </div>

      <div class="box mt-3">
        <label class="checkbox">
          <input type="checkbox" id="createNewFile">
          Crear nuevo archivo
        </label>
        <div class="field mt-3 hidden" id="newFileField">
          <div class="control">
            <input class="input" type="text" id="newFileName" placeholder="Nombre del archivo (ej: CONTROL DE PAGOS DEL TRIMESTRE 2026-1.xlsx)">
          </div>
        </div>
      </div>

      <div class="field is-grouped mt-5">
        <div class="control">
          <button class="button is-primary" id="addPaymentBtn">
            <span class="icon">
              <i class="mdi mdi-content-save"></i>
            </span>
            <span>Agregar Pago</span>
          </button>
        </div>
        <div class="control">
          <button class="button is-light" id="cancelBtn">
            <span class="icon">
              <i class="mdi mdi-close"></i>
            </span>
            <span>Cancelar</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal OCR -->
<div class="modal" id="ocrModal">
  <div class="modal-background"></div>
  <div class="modal-card">
    <header class="modal-card-head">
      <p class="modal-card-title">
        <span class="icon-text">
          <span class="icon has-text-info">
            <i class="mdi mdi-camera-image"></i>
          </span>
          <span>Escanear Comprobante de Pago</span>
        </span>
      </p>
      <button class="delete" aria-label="close" id="closeOcrModalBtn"></button>
    </header>
    <section class="modal-card-body">
      <input type="file" id="paymentImageInput" accept="image/*" style="display: none;">
      
      <div id="ocrDropZone" class="ocr-drop-zone">
        <div class="ocr-icon-wrapper">
          <span class="icon is-large">
            <i class="mdi mdi-bank-transfer mdi-48px"></i>
          </span>
        </div>
        <h3 class="title is-5 has-text-centered mb-2">Escanear Comprobante</h3>
        <p class="has-text-grey has-text-centered mb-4">
          Arrastra tu captura de pago o haz clic para seleccionar
        </p>
        <div class="bank-icons">
          <span class="icon has-text-grey-light" title="BDV">
            <i class="mdi mdi-bank mdi-24px"></i>
          </span>
          <span class="icon has-text-grey-light" title="Banesco">
            <i class="mdi mdi-bank mdi-24px"></i>
          </span>
          <span class="icon has-text-grey-light" title="Mercantil">
            <i class="mdi mdi-bank mdi-24px"></i>
          </span>
          <span class="icon has-text-grey-light" title="Provincial">
            <i class="mdi mdi-bank mdi-24px"></i>
          </span>
        </div>
      </div>

      <div id="ocrPreview" class="ocr-preview" style="display: none;">
        <div class="columns is-mobile is-vcentered">
          <div class="column is-narrow">
            <figure class="image is-64x64">
              <img id="ocrPreviewImage" src="" alt="Preview">
            </figure>
          </div>
          <div class="column">
            <p class="has-text-weight-semibold" id="ocrFileName"></p>
            <p class="help" id="ocrStatusText">Procesando con OCR...</p>
          </div>
          <div class="column is-narrow">
            <button class="delete is-medium" id="ocrRemoveBtn"></button>
          </div>
        </div>
        <progress class="progress is-small is-primary mt-2" id="ocrProgress" max="100">0%</progress>
      </div>
    </section>
  </div>
</div>
